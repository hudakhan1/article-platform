<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArticleHub - Set New Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1a202c, #2d3748);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 450px;
      border-radius: 20px;
      box-shadow: 0 0 35px rgba(0, 230, 230, 0.4);
      overflow: hidden;
      background: #2d3748;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-container {
      padding: 40px 30px;
      color: white;
      position: relative;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-weight: 700;
      font-size: 28px;
      background: linear-gradient(45deg, #00e6e6, #00b3b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      color: #a0aec0;
      margin-top: 8px;
      font-size: 14px;
    }

    .input-group {
      position: relative;
      width: 100%;
      margin-bottom: 25px;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00e6e6;
      z-index: 2;
      cursor: pointer;
    }

    .input-group .toggle-password {
      left: auto;
      right: 15px;
      cursor: pointer;
    }

    .input-group input {
      width: 100%;
      padding: 15px 45px;
      border-radius: 50px;
      border: 2px solid #4a5568;
      background: #1a202c;
      color: white;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .input-group input:focus {
      outline: none;
      border-color: #00e6e6;
      box-shadow: 0 0 15px rgba(0, 230, 230, 0.4);
    }

    .password-strength {
      height: 5px;
      width: 100%;
      background: #4a5568;
      border-radius: 3px;
      margin-top: 5px;
      overflow: hidden;
    }

    .strength-meter {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: all 0.3s ease;
    }

    .password-requirements {
      margin-top: 10px;
      font-size: 12px;
      color: #a0aec0;
    }

    .requirement {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 5px;
    }

    .requirement i {
      font-size: 10px;
    }

    .btn {
      padding: 15px 20px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(45deg, #00e6e6, #0066cc);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      font-size: 16px;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 230, 230, 0.4);
    }

    .back-link {
      text-align: center;
      margin-top: 25px;
    }

    .back-link a {
      color: #00e6e6;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.3s ease;
    }

    .back-link a:hover {
      color: #00b3b3;
      text-decoration: underline;
    }

    .floating-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .floating-icon {
      position: absolute;
      opacity: 0.1;
      color: #00e6e6;
      font-size: 24px;
      animation: float 15s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    .instruction-text {
      background: rgba(0, 230, 230, 0.1);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 25px;
      font-size: 14px;
      border-left: 4px solid #00e6e6;
    }

    .password-match {
      margin-top: 5px;
      font-size: 12px;
      height: 15px;
    }

    @media (max-width: 480px) {
      .form-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="floating-icons">
      <i class="floating-icon fas fa-lock" style="top: 10%; left: 10%; animation-delay: 0s;"></i>
      <i class="floating-icon fas fa-key" style="top: 20%; left: 85%; animation-delay: 2s;"></i>
      <i class="floating-icon fas fa-shield-alt" style="top: 70%; left: 15%; animation-delay: 4s;"></i>
      <i class="floating-icon fas fa-check-circle" style="top: 80%; left: 80%; animation-delay: 6s;"></i>
    </div>

    <div class="form-container">
      <div class="logo">
        <h1><i class="fas fa-lock"></i> Set New Password</h1>
        <p>Create a strong and secure password</p>
      </div>

      <div class="instruction-text">
        <i class="fas fa-info-circle"></i> Your new password must be different from previously used passwords.
      </div>

      <form method="POST">
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" name="password" required placeholder="Enter new password">
          <i class="fas fa-eye toggle-password" id="togglePassword"></i>
          <div class="password-strength">
            <div class="strength-meter" id="strengthMeter"></div>
          </div>
          <div class="password-requirements">
            <div class="requirement" id="lengthReq">
              <i class="fas fa-circle"></i>
              <span>At least 8 characters</span>
            </div>
            <div class="requirement" id="upperReq">
              <i class="fas fa-circle"></i>
              <span>One uppercase letter</span>
            </div>
            <div class="requirement" id="lowerReq">
              <i class="fas fa-circle"></i>
              <span>One lowercase letter</span>
            </div>
            <div class="requirement" id="numberReq">
              <i class="fas fa-circle"></i>
              <span>One number</span>
            </div>
          </div>
        </div>

        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="confirmPassword" name="confirm_password" required placeholder="Re-enter new password">
          <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
          <div class="password-match" id="passwordMatch"></div>
        </div>

        <button type="submit" class="btn" id="submitButton">
          <i class="fas fa-key"></i> Update Password
        </button>
      </form>

      <div class="back-link">
        <a href="/login">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>
  </div>

  <script>
    // Add animation to form elements when page loads
    document.addEventListener('DOMContentLoaded', function() {
      const inputs = document.querySelectorAll('input');
      inputs.forEach((input, index) => {
        input.style.opacity = 0;
        input.style.transform = 'translateY(10px)';
        setTimeout(() => {
          input.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
          input.style.opacity = 1;
          input.style.transform = 'translateY(0)';
        }, 100 * index);
      });

      // Password visibility toggling
      const togglePassword = document.getElementById('togglePassword');
      const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');

      togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
      });

      toggleConfirmPassword.addEventListener('click', function() {
        const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmPasswordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
      });

      // Password strength checking
      passwordInput.addEventListener('input', function() {
        checkPasswordStrength(this.value);
        checkPasswordMatch();
      });

      confirmPasswordInput.addEventListener('input', checkPasswordMatch);

      function checkPasswordStrength(password) {
        let strength = 0;
        const requirements = {
          length: false,
          upper: false,
          lower: false,
          number: false
        };

        // Check length
        if (password.length >= 8) {
          strength += 25;
          requirements.length = true;
          document.getElementById('lengthReq').style.color = '#00e6e6';
          document.getElementById('lengthReq').querySelector('i').className = 'fas fa-check-circle';
        } else {
          document.getElementById('lengthReq').style.color = '#a0aec0';
          document.getElementById('lengthReq').querySelector('i').className = 'fas fa-circle';
        }

        // Check uppercase
        if (/[A-Z]/.test(password)) {
          strength += 25;
          requirements.upper = true;
          document.getElementById('upperReq').style.color = '#00e6e6';
          document.getElementById('upperReq').querySelector('i').className = 'fas fa-check-circle';
        } else {
          document.getElementById('upperReq').style.color = '#a0aec0';
          document.getElementById('upperReq').querySelector('i').className = 'fas fa-circle';
        }

        // Check lowercase
        if (/[a-z]/.test(password)) {
          strength += 25;
          requirements.lower = true;
          document.getElementById('lowerReq').style.color = '#00e6e6';
          document.getElementById('lowerReq').querySelector('i').className = 'fas fa-check-circle';
        } else {
          document.getElementById('lowerReq').style.color = '#a0aec0';
          document.getElementById('lowerReq').querySelector('i').className = 'fas fa-circle';
        }

        // Check number
        if (/[0-9]/.test(password)) {
          strength += 25;
          requirements.number = true;
          document.getElementById('numberReq').style.color = '#00e6e6';
          document.getElementById('numberReq').querySelector('i').className = 'fas fa-check-circle';
        } else {
          document.getElementById('numberReq').style.color = '#a0aec0';
          document.getElementById('numberReq').querySelector('i').className = 'fas fa-circle';
        }

        // Update strength meter
        const strengthMeter = document.getElementById('strengthMeter');
        strengthMeter.style.width = strength + '%';

        if (strength < 50) {
          strengthMeter.style.background = '#e53e3e'; // Red
        } else if (strength < 100) {
          strengthMeter.style.background = '#d69e2e'; // Yellow
        } else {
          strengthMeter.style.background = '#38a169'; // Green
        }
      }

      function checkPasswordMatch() {
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        const matchElement = document.getElementById('passwordMatch');
        const submitButton = document.getElementById('submitButton');

        if (confirmPassword === '') {
          matchElement.textContent = '';
          submitButton.style.opacity = '0.7';
          return;
        }

        if (password === confirmPassword) {
          matchElement.innerHTML = '<i class="fas fa-check-circle"></i> Passwords match';
          matchElement.style.color = '#38a169';
          submitButton.style.opacity = '1';
        } else {
          matchElement.innerHTML = '<i class="fas fa-times-circle"></i> Passwords do not match';
          matchElement.style.color = '#e53e3e';
          submitButton.style.opacity = '0.7';
        }
      }
    });
  </script>

</body>
</html>
