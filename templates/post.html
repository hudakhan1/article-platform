<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen text-white">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-[500px]">
    <h2 class="text-2xl font-bold mb-6 text-center">Create Post</h2>

    <form action="/post" method="POST" enctype="multipart/form-data" class="flex flex-col gap-4">

      <!-- Text -->
      <textarea name="content" rows="4" placeholder="What's on your mind?"
        class="p-3 rounded bg-gray-700 focus:outline-none text-white"></textarea>

      <!-- Image upload -->
      <label class="text-sm text-gray-300">Optional: Upload an image</label>
      <input type="file" name="image" accept="image/*" class="p-2 rounded bg-gray-700 text-sm">

      <!-- Video upload -->
      <label class="text-sm text-gray-300">Optional: Upload a video</label>
      <input type="file" name="video" accept="video/*" class="p-2 rounded bg-gray-700 text-sm">

      <!-- Post button -->
      <button type="submit" class="bg-cyan-500 px-4 py-2 rounded hover:bg-cyan-600">
        Post
      </button>
    </form>
  </div>

</body>
</html>
