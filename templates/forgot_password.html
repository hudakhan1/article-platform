<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArticleHub - Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1a202c, #2d3748);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 450px;
      border-radius: 20px;
      box-shadow: 0 0 35px rgba(0, 230, 230, 0.4);
      overflow: hidden;
      background: #2d3748;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-container {
      padding: 40px 30px;
      color: white;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-weight: 700;
      font-size: 28px;
      background: linear-gradient(45deg, #00e6e6, #00b3b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      color: #a0aec0;
      margin-top: 8px;
      font-size: 14px;
    }

    .input-group {
      position: relative;
      width: 100%;
      margin-bottom: 25px;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00e6e6;
      z-index: 2;
    }

    .input-group input, .input-group select {
      width: 100%;
      padding: 15px 15px 15px 45px;
      border-radius: 50px;
      border: 2px solid #4a5568;
      background: #1a202c;
      color: white;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: #00e6e6;
      box-shadow: 0 0 15px rgba(0, 230, 230, 0.4);
    }

    .btn {
      padding: 15px 20px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(45deg, #00e6e6, #0066cc);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      font-size: 16px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 230, 230, 0.4);
    }

    .back-link {
      text-align: center;
      margin-top: 25px;
    }

    .back-link a {
      color: #00e6e6;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.3s ease;
    }

    .back-link a:hover {
      color: #00b3b3;
      text-decoration: underline;
    }

    .floating-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .floating-icon {
      position: absolute;
      opacity: 0.1;
      color: #00e6e6;
      font-size: 24px;
      animation: float 15s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    .instruction-text {
      background: rgba(0, 230, 230, 0.1);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 25px;
      font-size: 14px;
      border-left: 4px solid #00e6e6;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="floating-icons">
      <i class="floating-icon fas fa-key" style="top: 10%; left: 10%; animation-delay: 0s;"></i>
      <i class="floating-icon fas fa-lock" style="top: 20%; left: 85%; animation-delay: 2s;"></i>
      <i class="floating-icon fas fa-shield-alt" style="top: 70%; left: 15%; animation-delay: 4s;"></i>
      <i class="floating-icon fas fa-envelope" style="top: 80%; left: 80%; animation-delay: 6s;"></i>
    </div>

    <div class="form-container">
      <div class="logo">
        <h1><i class="fas fa-lock"></i> Reset Password</h1>
        <p>Enter your details to recover your account</p>
      </div>

      <div class="instruction-text">
        <i class="fas fa-info-circle"></i> Enter your role and email address. We'll send you a password reset link.
      </div>

      <form method="POST">
        <div class="input-group">
          <i class="fas fa-user-tag"></i>
          <select name="role" required>
            <option value="">Select Your Role</option>
            <option value="admin">Admin</option>
            <option value="user">User</option>
          </select>
        </div>

        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" required placeholder="Enter your email address">
        </div>

        <button type="submit" class="btn">
          <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>
      </form>

      <div class="back-link">
        <a href="/login">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>
  </div>

  <script>
    // Add animation to form elements when page loads
    document.addEventListener('DOMContentLoaded', function() {
      const inputs = document.querySelectorAll('input, select');
      inputs.forEach((input, index) => {
        input.style.opacity = 0;
        input.style.transform = 'translateY(10px)';
        setTimeout(() => {
          input.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
          input.style.opacity = 1;
          input.style.transform = 'translateY(0)';
        }, 100 * index);
      });
    });
  </script>

</body>
</html>
