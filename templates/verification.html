<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArticleHub - Verify Code</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1a202c, #2d3748);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 450px;
      border-radius: 20px;
      box-shadow: 0 0 35px rgba(0, 230, 230, 0.4);
      overflow: hidden;
      background: #2d3748;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-container {
      padding: 40px 30px;
      color: white;
      position: relative;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      font-weight: 700;
      font-size: 28px;
      background: linear-gradient(45deg, #00e6e6, #00b3b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      color: #a0aec0;
      margin-top: 8px;
      font-size: 14px;
    }

    .input-group {
      position: relative;
      width: 100%;
      margin-bottom: 25px;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00e6e6;
      z-index: 2;
    }

    .input-group input {
      width: 100%;
      padding: 15px 15px 15px 45px;
      border-radius: 50px;
      border: 2px solid #4a5568;
      background: #1a202c;
      color: white;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .input-group input:focus {
      outline: none;
      border-color: #00e6e6;
      box-shadow: 0 0 15px rgba(0, 230, 230, 0.4);
    }

    .btn {
      padding: 15px 20px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(45deg, #00e6e6, #0066cc);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      font-size: 16px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 230, 230, 0.4);
    }

    .back-link {
      text-align: center;
      margin-top: 25px;
    }

    .back-link a {
      color: #00e6e6;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.3s ease;
    }

    .back-link a:hover {
      color: #00b3b3;
      text-decoration: underline;
    }

    .floating-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .floating-icon {
      position: absolute;
      opacity: 0.1;
      color: #00e6e6;
      font-size: 24px;
      animation: float 15s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    .instruction-text {
      background: rgba(0, 230, 230, 0.1);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 25px;
      font-size: 14px;
      border-left: 4px solid #00e6e6;
    }

    .countdown {
      text-align: center;
      margin-top: 15px;
      color: #a0aec0;
      font-size: 14px;
    }

    .countdown span {
      color: #00e6e6;
      font-weight: 600;
    }

    .resend-link {
      text-align: center;
      margin-top: 10px;
    }

    .resend-link a {
      color: #00e6e6;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: all 0.3s ease;
    }

    .resend-link a:hover {
      color: #00b3b3;
      text-decoration: underline;
    }

    /* OTP Input Styling */
    .otp-container {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
      gap: 10px;
    }

    .otp-input {
      width: 50px;
      height: 50px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      border: 2px solid #4a5568;
      border-radius: 10px;
      background: #1a202c;
      color: white;
      transition: all 0.3s ease;
    }

    .otp-input:focus {
      outline: none;
      border-color: #00e6e6;
      box-shadow: 0 0 10px rgba(0, 230, 230, 0.4);
      transform: scale(1.05);
    }

    @media (max-width: 480px) {
      .otp-input {
        width: 40px;
        height: 40px;
        font-size: 18px;
      }

      .form-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="floating-icons">
      <i class="floating-icon fas fa-shield-alt" style="top: 10%; left: 10%; animation-delay: 0s;"></i>
      <i class="floating-icon fas fa-lock" style="top: 20%; left: 85%; animation-delay: 2s;"></i>
      <i class="floating-icon fas fa-key" style="top: 70%; left: 15%; animation-delay: 4s;"></i>
      <i class="floating-icon fas fa-check-circle" style="top: 80%; left: 80%; animation-delay: 6s;"></i>
    </div>

    <div class="form-container">
      <div class="logo">
        <h1><i class="fas fa-shield-alt"></i> Verify Identity</h1>
        <p>Enter the verification code sent to your email</p>
      </div>

      <div class="instruction-text">
        <i class="fas fa-info-circle"></i> Check your email for a 6-digit verification code and enter it below.
      </div>

      <form method="POST">
        <div class="otp-container">
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="one-time-code" required>
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
          <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
        </div>

        <input type="hidden" name="code" id="fullCode">

        <button type="submit" class="btn">
          <i class="fas fa-check-circle"></i> Verify Code
        </button>
      </form>

      <div class="countdown">
        Code expires in: <span id="timer">05:00</span>
      </div>

      <div class="resend-link">
        <a href="#">
          <i class="fas fa-paper-plane"></i> Resend Verification Code
        </a>
      </div>

      <div class="back-link">
        <a href="/login">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>
  </div>

  <script>
    // Add animation to form elements when page loads
    document.addEventListener('DOMContentLoaded', function() {
      const inputs = document.querySelectorAll('input');
      inputs.forEach((input, index) => {
        input.style.opacity = 0;
        input.style.transform = 'translateY(10px)';
        setTimeout(() => {
          input.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
          input.style.opacity = 1;
          input.style.transform = 'translateY(0)';
        }, 100 * index);
      });

      // Start countdown timer
      startTimer(5 * 60, document.getElementById('timer'));

      // OTP input automation
      const otpInputs = document.querySelectorAll('.otp-input');
      const hiddenInput = document.getElementById('fullCode');

      otpInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
          // Auto-tab to next input
          if (e.target.value.length === 1 && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
          }

          // Update hidden input with full code
          updateHiddenInput();
        });

        input.addEventListener('keydown', (e) => {
          // Move to previous input on backspace
          if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
            otpInputs[index - 1].focus();
          }
        });
      });

      function updateHiddenInput() {
        let fullCode = '';
        otpInputs.forEach(input => {
          fullCode += input.value;
        });
        hiddenInput.value = fullCode;
      }
    });

    function startTimer(duration, display) {
      let timer = duration, minutes, seconds;
      const countdown = setInterval(function () {
        minutes = parseInt(timer / 60, 10);
        seconds = parseInt(timer % 60, 10);

        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        display.textContent = minutes + ":" + seconds;

        if (--timer < 0) {
          clearInterval(countdown);
          display.textContent = "00:00";
          display.style.color = "#e53e3e";
        }
      }, 1000);
    }
  </script>

</body>
</html>
