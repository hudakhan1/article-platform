<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArticleHub - Login & Signup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1a202c, #2d3748);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 900px;
      height: auto;
      min-height: 500px;
      border-radius: 20px;
      box-shadow: 0 0 35px rgba(0, 230, 230, 0.4);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #2d3748;
    }

    @media (min-width: 768px) {
      .wrapper {
        flex-direction: row;
        height: 500px;
      }
    }

    .hidden {
      display: none;
    }

    .form-section, .info-section {
      width: 100%;
      padding: 30px 25px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    @media (min-width: 768px) {
      .form-section, .info-section {
        width: 50%;
        padding: 30px;
      }
    }

    .form-section {
      background: #2d3748;
      color: white;
      gap: 20px;
    }

    .info-section {
      background: linear-gradient(135deg, #00e6e6, #0066cc);
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .animated-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.1;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100"><circle cx="50" cy="50" r="40" stroke="%2300e6e6" stroke-width="2" fill="none" /><rect x="25" y="25" width="50" height="50" stroke="%2300e6e6" stroke-width="2" fill="none" /></svg>');
      background-size: 200px;
      animation: bgMove 20s infinite linear;
    }

    @keyframes bgMove {
      0% { background-position: 0 0; }
      100% { background-position: 200px 200px; }
    }

    .floating-icons {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .floating-icon {
      position: absolute;
      opacity: 0.2;
      color: white;
      font-size: 24px;
      animation: float 15s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
      100% { transform: translateY(0) rotate(360deg); }
    }

    .form-container {
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    h2 {
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #00e6e6, #00b3b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input-group {
      position: relative;
      width: 100%;
    }

    .input-group i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #00e6e6;
    }

    .input-group input, .input-group select {
      width: 100%;
      padding: 12px 15px 12px 45px;
      border-radius: 50px;
      border: 2px solid #4a5568;
      background: #1a202c;
      color: white;
      transition: all 0.3s ease;
    }

    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: #00e6e6;
      box-shadow: 0 0 10px rgba(0, 230, 230, 0.5);
    }

    .btn {
      padding: 12px 20px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(45deg, #00e6e6, #0066cc);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 230, 230, 0.4);
    }

    .file-upload-container {
      width: 100%;
      margin: 10px 0;
    }

    .file-input-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      border-radius: 10px;
      background: #1a202c;
      color: #a0aec0;
      border: 2px dashed #4a5568;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
      gap: 8px;
    }

    .file-input-label:hover {
      border-color: #00e6e6;
      color: #00e6e6;
    }

    .file-input {
      display: none;
    }

    .link {
      color: #00e6e6;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .link:hover {
      text-decoration: underline;
      color: #00b3b3;
    }

    .info-content {
      position: relative;
      z-index: 1;
    }

    .info-content h2 {
      font-size: 28px;
      margin-bottom: 20px;
      background: linear-gradient(45deg, #fff, #e6ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .info-content p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.1);
      padding: 8px 15px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
    }

    .toggle-forms {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      gap: 10px;
    }

    .toggle-btn {
      padding: 8px 20px;
      border-radius: 20px;
      border: 2px solid #00e6e6;
      background: transparent;
      color: #00e6e6;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .toggle-btn.active {
      background: #00e6e6;
      color: #1a202c;
    }

    /* Animation for form switching */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-fadeIn {
      animation: fadeIn 0.5s ease forwards;
    }

    .file-name {
      font-size: 12px;
      margin-top: 5px;
      color: #00e6e6;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <!-- Form Section -->
    <div class="form-section">
      <!-- Toggle Buttons for Mobile -->
      <div class="toggle-forms md:hidden">
        <button class="toggle-btn active" onclick="showLogin()">Login</button>
        <button class="toggle-btn" onclick="showSignup()">Signup</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginForm" class="form-container animate-fadeIn">
        <h2 class="text-2xl">Welcome Back</h2>
        <form action="/user_login" method="POST">
          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="Email" required>
          </div>

          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Password" required>
          </div>

          <div class="input-group">
            <i class="fas fa-user-tag"></i>
            <select name="role" class="text-white">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>

          <button type="submit" class="btn w-full">
            <i class="fas fa-sign-in-alt"></i> Login
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="text-sm">Don't have an account?
            <a href="#" onclick="showSignup()" class="link">Sign up</a>
          </p>
          <p class="text-sm mt-2">
            <a href="/forgot_password" class="link">
              <i class="fas fa-key"></i> Forgot Password?
            </a>
          </p>
        </div>
      </div>

      <!-- SIGNUP FORM -->
      <div id="signupForm" class="form-container hidden animate-fadeIn">
        <h2 class="text-2xl">Create Account</h2>
        <form action="/user_signup" method="POST" enctype="multipart/form-data">
          <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" name="name" placeholder="Full Name" required>
          </div>

          <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" name="email" placeholder="Email" required>
          </div>

          <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" name="password" placeholder="Password" required>
          </div>

          <div class="file-upload-container">
            <label for="profile-pic" class="file-input-label">
              <i class="fas fa-cloud-upload-alt"></i>
              <span>Upload Profile Picture</span>
            </label>
            <input type="file" id="profile-pic" name="profile_pic" class="file-input" accept="image/*">
            <div id="file-name" class="file-name"></div>
          </div>

          <button type="submit" class="btn w-full">
            <i class="fas fa-user-plus"></i> Sign Up
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="text-sm">Already have an account?
            <a href="#" onclick="showLogin()" class="link">Login</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Info Section -->
    <div class="info-section">
      <div class="animated-bg"></div>
      <div class="floating-icons">
        <i class="floating-icon fas fa-pencil-alt" style="top: 10%; left: 20%; animation-delay: 0s;"></i>
        <i class="floating-icon fas fa-book" style="top: 30%; left: 70%; animation-delay: 2s;"></i>
        <i class="floating-icon fas fa-heart" style="top: 70%; left: 40%; animation-delay: 4s;"></i>
        <i class="floating-icon fas fa-comment" style="top: 50%; left: 10%; animation-delay: 6s;"></i>
        <i class="floating-icon fas fa-share-alt" style="top: 20%; left: 50%; animation-delay: 8s;"></i>
      </div>

      <div class="info-content">
        <h2 id="welcomeText">WELCOME BACK!</h2>
        <p id="infoText">We're happy to have you with us again. Continue your journey of sharing knowledge and connecting with others.</p>

        <div class="features">
          <div class="feature">
            <i class="fas fa-edit text-cyan-300"></i>
            <span>Write Articles</span>
          </div>
          <div class="feature">
            <i class="fas fa-thumbs-up text-cyan-300"></i>
            <span>Like & Comment</span>
          </div>
          <div class="feature">
            <i class="fas fa-users text-cyan-300"></i>
            <span>Build Community</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function showSignup() {
      document.getElementById("loginForm").classList.add("hidden");
      document.getElementById("signupForm").classList.remove("hidden");
      document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.toggle-btn')[1].classList.add('active');

      // Update info section text
      document.getElementById("welcomeText").innerText = "WELCOME!";
      document.getElementById("infoText").innerText = "We're delighted to have you here. Join our community to share your thoughts, articles and connect with like-minded people.";
    }

    function showLogin() {
      document.getElementById("signupForm").classList.add("hidden");
      document.getElementById("loginForm").classList.remove("hidden");
      document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.toggle-btn')[0].classList.add('active');

      // Update info section text
      document.getElementById("welcomeText").innerText = "WELCOME BACK!";
      document.getElementById("infoText").innerText = "We're happy to have you with us again. Continue your journey of sharing knowledge and connecting with others.";
    }

    // File upload functionality
    document.getElementById('profile-pic').addEventListener('change', function(e) {
      const fileName = e.target.files[0].name;
      document.getElementById('file-name').textContent = `Selected: ${fileName}`;
    });

    // Make the page responsive
    window.addEventListener('resize', function() {
      if (window.innerWidth < 768) {
        // Mobile view
        document.querySelector('.info-section').style.display = 'flex';
      } else {
        // Desktop view
        document.querySelector('.info-section').style.display = 'flex';
      }
    });
  </script>

</body>
</html>
