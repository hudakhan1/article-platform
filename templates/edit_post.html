<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Post</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen text-white">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-[500px]">
    <h2 class="text-2xl font-bold mb-6 text-center">Edit Post</h2>

    <form action="/edit_post/{{ post_id }}" method="POST" enctype="multipart/form-data" class="flex flex-col gap-4">

      <!-- Text -->
      <textarea name="content" rows="4" placeholder="Update your text..."
        class="p-3 rounded bg-gray-700 focus:outline-none text-white">{{ post.content }}</textarea>

      <!-- Current Image -->
      {% if post.image %}
        <p class="text-sm text-gray-300">Current Image:</p>
        <img src="{{ url_for('static', filename=post.image.replace('static/', '').replace('\\', '/')) }}"
             alt="Post Image" class="rounded mb-2 w-40 h-40 object-cover">
      {% endif %}

      <!-- Current Video -->
      {% if post.video %}
        <p class="text-sm text-gray-300">Current Video:</p>
        <video controls class="rounded mb-2 w-full max-h-60">
          <source src="{{ url_for('static', filename=post.video.replace('static/', '').replace('\\', '/')) }}" type="video/mp4">
          Your browser does not support the video tag.
        </video>
      {% endif %}

      <!-- Upload New Image -->
      <label class="text-sm text-gray-300">Upload New Image (optional)</label>
      <input type="file" name="image" accept="image/*" class="p-2 rounded bg-gray-700 text-sm">

      <!-- Upload New Video -->
      <label class="text-sm text-gray-300">Upload New Video (optional)</label>
      <input type="file" name="video" accept="video/*" class="p-2 rounded bg-gray-700 text-sm">

      <!-- Save button -->
      <button type="submit" class="bg-cyan-500 px-4 py-2 rounded hover:bg-cyan-600">
        Save Changes
      </button>
    </form>
  </div>

</body>
</html>
