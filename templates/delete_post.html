<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Post</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen text-white">

  <div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-[450px] text-center">
    <h2 class="text-2xl font-bold mb-4">Delete Post</h2>
    <p class="mb-6 text-gray-300">Are you sure you want to delete this post?</p>

    <!-- Post Content -->
    {% if post.content %}
      <p class="mb-3">{{ post.content }}</p>
    {% endif %}
    {% if post.image %}
      <img src="{{ url_for('static', filename=post.image.replace('static/', '').replace('\\', '/')) }}"
           alt="Post Image"
           class="rounded mb-3 w-40 h-40 object-cover mx-auto">
    {% endif %}

    <form action="/delete_post/{{ post_id }}" method="POST" class="flex gap-4 justify-center mt-6">
      <button type="submit" class="bg-red-500 px-4 py-2 rounded hover:bg-red-600">Yes, Delete</button>
      <a href="{{ url_for('my_profile') }}" class="bg-gray-500 px-4 py-2 rounded hover:bg-gray-600">Cancel</a>
    </form>
  </div>

</body>
</html>
